    const name = document.getElementById('add-name').value || `点声源_${APP.objects.length + 1}`;
    const x  = parseFloat(document.getElementById('add-x').value)  || 0;
    const y  = parseFloat(document.getElementById('add-y').value)  || 0;
    const z  = parseFloat(document.getElementById('add-z').value)  || 1.5;
    const lw = parseFloat(document.getElementById('add-lw').value) || 80;
    try {
      await invoke('add_point_source', { scenarioId: APP.currentScenarioId, name, x, y, z, lwDb: lw });
      await loadObjects();
      renderObjectList();
    } catch(err) { showStatus('添加失败: ' + err, 'err'); }
  });

  document.getElementById('btn-draw-road').addEventListener('click', () => {
    if (!APP.currentScenarioId) { showStatus('请先选择场景', 'err'); return; }
    setActiveTool('road');
    TC._startDraw('road');
    showStatus('单击添加顶点，双击完成，Esc 取消', 'ready');
  });

  document.getElementById('btn-draw-barrier').addEventListener('click', () => {
    if (!APP.currentScenarioId) { showStatus('请先选择场景', 'err'); return; }
    setActiveTool('barrier');
    TC._startDraw('barrier');
    showStatus('单击添加顶点，双击完成，Esc 取消', 'ready');
  });

  // ── 计算按钮 ──
  async function runCalc() {
    if (!APP.currentScenarioId) { showStatus('请先选择场景', 'err'); return; }
    if (!APP.objects.length)    { showStatus('请先添加声源对象', 'err'); return; }
    const metric = document.getElementById('calc-metric').value;
    const res    = parseFloat(document.getElementById('calc-res').value)    || 10;
    const extent = parseFloat(document.getElementById('calc-extent').value) || 500;
    // Compute bounding box from objects, fallback to extent padding around origin
    let bxmin = Infinity, bymin = Infinity, bxmax = -Infinity, bymax = -Infinity;
    APP.objects.forEach(o => {
      const pts = o.position ? [[o.position[0], o.position[1]]] : (o.vertices || []);
      pts.forEach(([x, y]) => { bxmin=Math.min(bxmin,x); bymin=Math.min(bymin,y); bxmax=Math.max(bxmax,x); bymax=Math.max(bymax,y); });
    });
    if (!isFinite(bxmin)) { bxmin = -extent/2; bymin = -extent/2; bxmax = extent/2; bymax = extent/2; }
    else { bxmin -= extent/2; bymin -= extent/2; bxmax += extent/2; bymax += extent/2; }
    showStatus('计算中…', 'run');
    try {
      APP.calcResult = await invoke('run_calculation', {
        scenarioId: APP.currentScenarioId, metric,
        resolutionM: res,
        xmin: bxmin, ymin: bymin, xmax: bxmax, ymax: bymax,
      });
      document.getElementById('map-overlay').classList.add('hidden');
      vp.fitToObjects(APP.objects, APP.calcResult);
      vp.requestRedraw();
      if (APP.activeView === '3d' && R3D._initialized) R3D.sync();
      const npts = (APP.calcResult.nx || 0) * (APP.calcResult.ny || 0);
      showStatus(`计算完成 — ${npts} 个格点`, 'ready');
      _updateResultsPanel(APP.calcResult);
    } catch(err) { showStatus('计算失败: ' + err, 'err'); }
  }
  document.getElementById('btn-run').addEventListener('click',  runCalc);
  document.getElementById('btn-run2').addEventListener('click', runCalc);

  // ── 导出按钮 ──
  document.querySelectorAll('[data-export]').forEach(a => {
    a.addEventListener('click', async () => {
      if (!APP.calcResult) { showStatus('请先计算', 'err'); return; }
      const fmt = a.dataset.export;
      try {
        const path = await saveDialog({ filters:[{ name:fmt.toUpperCase(), extensions:[fmt] }] });
        if (!path) return;
        await invoke('export_file', { calcId: APP.calcResult.calc_id, format: fmt, filePath: path });
        showStatus('导出成功: ' + path, 'ready');
      } catch(err) { showStatus('导出失败: ' + err, 'err'); }
    });
  });

  // ── 热图透明度滑块 ──
  document.getElementById('heatmap-opacity').addEventListener('input', function() {
    APP.heatmapOpacity = parseInt(this.value) / 100;
    vp.requestRedraw();
  });

  loadProjects();
  showStatus('NoiseCad 桌面版已就绪 — 2D/3D CAD 噪声建模', 'ready');
});

function _updateSelectionCard() {
  const card = document.getElementById('card-selection');
  const body = document.getElementById('selection-body');
  const sel  = [...APP.selectedIds].map(id => APP.objects.find(o => o.row_id === id)).filter(Boolean);
  if (!sel.length) { card.style.display = 'none'; return; }
  card.style.display = '';
  if (sel.length > 1) {
    body.innerHTML = `<div class="note">${sel.length} 个对象已选中</div>`;
    return;
  }
  const obj = sel[0];
  const typeNames = { point_source:'点声源', road_source:'道路声源', barrier:'噪声墙' };
  let rows = `
    <div class="stat-row"><span class="stat-label">ID</span><span class="stat-val">${obj.row_id}</span></div>
    <div class="stat-row"><span class="stat-label">类型</span><span class="stat-val">${typeNames[obj.object_type]||obj.object_type}</span></div>
    <div class="stat-row"><span class="stat-label">名称</span><span class="stat-val" style="font-size:11px">${escHtml(obj.name)}</span></div>`;
  if (obj.object_type === 'point_source' && obj.position) {
    rows += `
    <div class="stat-row"><span class="stat-label">X (m)</span><span class="stat-val">${obj.position[0].toFixed(1)}</span></div>
    <div class="stat-row"><span class="stat-label">Y (m)</span><span class="stat-val">${obj.position[1].toFixed(1)}</span></div>
    <div class="stat-row"><span class="stat-label">Z (m)</span><span class="stat-val">${(obj.position[2]||0).toFixed(1)}</span></div>
    <div class="stat-row"><span class="stat-label">Lw (dB)</span><span class="stat-val mid">${(obj.lw_db||0).toFixed(1)}</span></div>`;
  } else if (obj.vertices?.length) {
    rows += `<div class="stat-row"><span class="stat-label">顶点数</span><span class="stat-val">${obj.vertices.length}</span></div>`;
    if (obj.height_m != null)
      rows += `<div class="stat-row"><span class="stat-label">高度 (m)</span><span class="stat-val">${obj.height_m.toFixed(1)}</span></div>`;
    if (obj.source_height_m != null)
      rows += `<div class="stat-row"><span class="stat-label">声源高 (m)</span><span class="stat-val">${obj.source_height_m.toFixed(2)}</span></div>`;
    // Polyline length
    let len = 0;
    for (let i = 0; i < obj.vertices.length - 1; i++) {
      const [ax,ay] = obj.vertices[i], [bx,by] = obj.vertices[i+1];
      len += Math.hypot(bx-ax, by-ay);
    }
    rows += `<div class="stat-row"><span class="stat-label">长度 (m)</span><span class="stat-val">${len.toFixed(1)}</span></div>`;
  }
  body.innerHTML = rows;
}

function _updateResultsPanel(result) {
  if (!result) return;
  const body = document.getElementById('results-body');
  const npts = (result.nx || 0) * (result.ny || 0);
  body.innerHTML = `
    <div class="stat-row"><span class="stat-label">最大值</span>
      <span class="stat-val high">${(result.max_db||0).toFixed(1)} dB</span></div>
    <div class="stat-row"><span class="stat-label">平均值</span>
      <span class="stat-val mid">${(result.mean_db||0).toFixed(1)} dB</span></div>
    <div class="stat-row"><span class="stat-label">最小值</span>
      <span class="stat-val low">${(result.min_db||0).toFixed(1)} dB</span></div>
    <div class="stat-row"><span class="stat-label">格点数</span>
      <span class="stat-val">${npts}</span></div>`;
}
</script>
</body>
</html>
