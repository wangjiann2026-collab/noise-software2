<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise CAD Desktop</title>
<style id="app-style">
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--border:#30363d;
  --accent:#1f6feb;--accent2:#58a6ff;
  --danger:#f85149;--success:#3fb950;--warn:#d29922;
  --text:#e6edf3;--muted:#8b949e;--btn:#21262d;--btn-h:#30363d;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:var(--bg);color:var(--text);height:100vh;
     display:flex;flex-direction:column;overflow:hidden;font-size:13px;user-select:none}

/* ── Toolbar ── */
#toolbar{height:48px;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:5px;flex-shrink:0;overflow-x:auto}
.logo{font-weight:700;font-size:15px;color:var(--accent2);letter-spacing:.5px;white-space:nowrap;margin-right:4px}
.logo span{color:var(--muted);font-weight:400}
.sep{width:1px;height:22px;background:var(--border);margin:0 3px;flex-shrink:0}
.spacer{flex:1}
.tool-group-label{font-size:10px;color:var(--muted);letter-spacing:.5px;white-space:nowrap;padding:0 2px}

.tbtn{padding:5px 10px;border-radius:5px;border:1px solid var(--border);
  background:var(--btn);color:var(--text);cursor:pointer;font-size:12px;
  transition:background .12s;white-space:nowrap;flex-shrink:0}
.tbtn:hover{background:var(--btn-h)}
.tbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.tbtn.primary:hover{filter:brightness(1.12)}
.tbtn.danger{border-color:var(--danger);color:var(--danger)}

/* 工具/视图按钮 active 状态 */
.tool-btn.active{background:rgba(31,111,235,.25);border-color:var(--accent);color:var(--accent2)}
.view-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* 命令按钮（比普通工具按钮小） */
.cmd-btn{padding:4px 7px;font-size:11px}

/* 下拉菜单 */
.drop{position:relative}
.drop-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;
  background:var(--panel);border:1px solid var(--border);border-radius:6px;
  min-width:150px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.drop:hover .drop-menu{display:block}
.drop-menu a{display:block;padding:7px 14px;color:var(--text);cursor:pointer;
  text-decoration:none;font-size:12px}
.drop-menu a:hover{background:var(--btn-h)}

/* ── Main 三栏 ── */
#main{flex:1;display:grid;grid-template-columns:260px 1fr 280px;overflow:hidden;min-height:0}

/* ── 通用面板 ── */
.panel{background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;min-height:0}
#right-panel-wrap{border-right:none;border-left:1px solid var(--border)}
.panel-hdr{padding:9px 12px;font-weight:600;font-size:11px;text-transform:uppercase;
  letter-spacing:.8px;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0}
.panel-body{flex:1;overflow-y:auto;padding:6px 0}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── 左侧树/列表 ── */
.section-hdr{padding:6px 12px 3px;font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
.add-btn{background:none;border:none;color:var(--accent2);cursor:pointer;
  font-size:16px;line-height:1;padding:0 2px}
.add-btn:hover{color:#fff}
.count-badge{background:var(--btn);border-radius:10px;padding:1px 6px;font-size:10px}

.proj-row{display:flex;align-items:center;padding:5px 10px 5px 12px;
  cursor:pointer;gap:6px;border-radius:4px;margin:0 4px;transition:background .1s}
.proj-row:hover{background:var(--btn-h)}
.proj-row.active{background:rgba(31,111,235,.2);color:var(--accent2)}
.proj-row .arrow{color:var(--muted);font-size:10px;width:10px}
.proj-row .pname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-row .del{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:13px;opacity:0;transition:opacity .1s}
.proj-row:hover .del{opacity:1}
.proj-row .del:hover{color:var(--danger)}

.scen-row{display:flex;align-items:center;padding:4px 10px 4px 28px;
  cursor:pointer;gap:6px;color:var(--muted);border-radius:4px;margin:0 4px;transition:background .1s}
.scen-row:hover{background:var(--btn-h);color:var(--text)}
.scen-row.active{background:rgba(31,111,235,.15);color:var(--accent2)}
.badge{font-size:9px;padding:1px 4px;border-radius:3px;background:var(--accent);
  color:#fff;font-weight:600;text-transform:uppercase}

.divider{height:1px;background:var(--border);margin:8px 0}

/* 对象列表行 */
.obj-row{display:flex;align-items:center;padding:4px 10px 4px 12px;
  gap:7px;border-radius:4px;margin:0 4px;cursor:pointer;transition:background .1s}
.obj-row:hover{background:var(--btn-h)}
.obj-row.active{background:rgba(31,111,235,.15)}
.type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ps{background:#58a6ff}.dot-road{background:#3fb950}.dot-bar{background:#f0883e}
.obj-row .oname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.obj-row .odel{background:none;border:none;color:var(--muted);cursor:pointer;
  opacity:0;font-size:13px}
.obj-row:hover .odel{opacity:1}
.obj-row .odel:hover{color:var(--danger)}

.empty-state{text-align:center;color:var(--muted);padding:16px 12px;font-size:12px;line-height:1.6}
.proj-item{margin-bottom:2px}
.proj-name-row{display:flex;align-items:center;gap:4px;padding:3px 6px;cursor:default;
  border-radius:4px;user-select:none}
.proj-name-row:hover{background:var(--btn)}
.proj-icon{font-size:12px;opacity:.7}
.proj-name-text{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scenario-row{display:flex;align-items:center;gap:4px;padding:3px 6px 3px 20px;cursor:pointer;
  border-radius:4px;user-select:none}
.scenario-row:hover{background:var(--btn)}
.scenario-row.active{background:rgba(31,111,235,.18);color:var(--accent2)}
.sc-icon{font-size:11px;opacity:.7}
.sc-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.obj-row.selected{background:rgba(31,111,235,.15)}

/* ── 中央 Canvas 区域 ── */
#map-area{display:flex;flex-direction:column;background:#0a0e14;overflow:hidden;position:relative}
#map-container{flex:1;position:relative;overflow:hidden;cursor:crosshair}
#canvas-2d,#canvas-3d{position:absolute;top:0;left:0;width:100%;height:100%}
.map-overlay{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;pointer-events:none}
.map-overlay.hidden{display:none}
.overlay-icon{font-size:40px;opacity:.2}
.map-overlay p{color:var(--muted);font-size:13px}
.map-overlay p:last-child strong{color:var(--accent2)}

#legend-bar{height:34px;flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);
  padding:4px 12px;display:flex;align-items:center;gap:8px}
.legend-label{font-size:10px;color:var(--muted);white-space:nowrap}
#legend-canvas{height:14px;flex:1;border-radius:3px}
#legend-ticks{display:flex;justify-content:space-between;min-width:200px;
  font-size:10px;color:var(--muted)}

/* ── 右侧面板内容 ── */
#right-panel{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
#right-panel::-webkit-scrollbar{width:4px}
#right-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.card{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:11px}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.7px;color:var(--muted);margin-bottom:9px}
.form-group{margin-bottom:7px}
.form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:2px}
.form-group input,.form-group select{width:100%;padding:5px 7px;
  background:var(--panel);border:1px solid var(--border);border-radius:5px;
  color:var(--text);font-size:12px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.btn-full{width:100%;padding:6px;border-radius:5px;border:1px solid var(--border);
  background:var(--btn);color:var(--text);cursor:pointer;font-size:12px;
  font-weight:600;transition:background .12s;margin-top:4px}
.btn-full:hover{background:var(--btn-h)}
.btn-full.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-full.primary:hover{filter:brightness(1.12)}
.note{font-size:11px;color:var(--muted);text-align:center;padding:4px 0}

.stat-row{display:flex;justify-content:space-between;align-items:center;
  padding:3px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--muted);font-size:11px}
.stat-val{font-weight:700;font-size:13px}
.stat-val.high{color:var(--danger)}.stat-val.mid{color:var(--warn)}.stat-val.low{color:var(--success)}

/* ── Status Bar ── */
#statusbar{height:24px;background:var(--panel);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:10px;font-size:11px;
  color:var(--muted);flex-shrink:0}
.sep-v{color:var(--border)}
.flex1{flex:1}
.mono{font-family:monospace;min-width:150px}
.muted{color:var(--muted)}
.status-chip{padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700}
.chip-ready{background:#1a3a1a;color:var(--success)}
.chip-run{background:#1a2a3a;color:var(--accent2)}
.chip-err{background:#3a1a1a;color:var(--danger)}
</style>
</head>
<body>

<!-- ══ TOOLBAR ══════════════════════════════════════════════════════════ -->
<div id="toolbar">
  <div class="logo">🔊 Noise<span>CAD</span></div>
  <div class="sep"></div>

  <!-- 文件操作 -->
  <button class="tbtn primary" id="btn-new-project" title="新建项目 (Ctrl+N)">+ 项目</button>
  <button class="tbtn" id="btn-fit" title="适应视图 (F)">⊡ 适应</button>
  <div class="drop">
    <button class="tbtn">⬇ 导出 ▾</button>
    <div class="drop-menu">
      <a data-export="geojson">GeoJSON 等值线</a>
      <a data-export="asc">ESRI ASCII Grid</a>
      <a data-export="csv">CSV (x,y,level)</a>
    </div>
  </div>

  <div class="sep"></div>

  <!-- 绘制工具组 -->
  <span class="tool-group-label">绘制</span>
  <button class="tbtn tool-btn active" data-tool="select" title="选择 (S)">↖ 选</button>
  <button class="tbtn tool-btn" data-tool="point"  title="点声源 (P)">● 点</button>
  <button class="tbtn tool-btn" data-tool="road"   title="道路 (R)">━ 路</button>
  <button class="tbtn tool-btn" data-tool="barrier" title="噪声墙 (B)">┃ 墙</button>
  <button class="tbtn tool-btn" data-tool="pan"    title="平移 (H)">✋ 移</button>

  <div class="sep"></div>

  <!-- 变换命令组 -->
  <span class="tool-group-label">变换</span>
  <button class="tbtn tool-btn cmd-btn" data-tool="move"   title="平移 (M)">⊕M</button>
  <button class="tbtn tool-btn cmd-btn" data-tool="rotate" title="旋转 (RO)">↻RO</button>
  <button class="tbtn tool-btn cmd-btn" data-tool="scale"  title="缩放 (SC)">⊞SC</button>
  <button class="tbtn tool-btn cmd-btn" data-tool="mirror" title="镜像 (MI)">⬡MI</button>
  <button class="tbtn tool-btn cmd-btn" data-tool="copy"   title="复制 (CO)">⿻CO</button>

  <div class="sep"></div>

  <!-- 折线编辑组 -->
  <span class="tool-group-label">折线</span>
  <button class="tbtn tool-btn cmd-btn" data-tool="trim"   title="修剪 (TR)">✂TR</button>
  <button class="tbtn tool-btn cmd-btn" data-tool="break"  title="打断 (BR)">⊗BR</button>
  <button class="tbtn tool-btn cmd-btn" data-tool="join"   title="合并 (J)">⊕J</button>
  <button class="tbtn tool-btn cmd-btn" data-tool="offset" title="偏移 (O)">↔O</button>
  <button class="tbtn tool-btn cmd-btn" data-tool="extend" title="延伸 (EX)">→|EX</button>

  <div class="spacer"></div>

  <!-- 计算 -->
  <button class="tbtn primary" id="btn-run" title="运行计算 (Ctrl+R)">▶ 计算</button>

  <div class="sep"></div>

  <!-- 视图切换 -->
  <button class="tbtn view-btn active" data-view="2d">2D</button>
  <button class="tbtn view-btn" data-view="3d">3D</button>
</div>

<!-- ══ MAIN ═════════════════════════════════════════════════════════════ -->
<div id="main">

  <!-- 左侧面板：项目树 + 对象列表 -->
  <div class="panel" id="left-panel">
    <div class="panel-hdr">资源管理器</div>
    <div class="panel-body">

      <div class="section-hdr">
        项目
        <button class="add-btn" id="btn-new-proj2" title="新建项目">+</button>
      </div>
      <div id="project-tree">
        <div class="empty-state">暂无项目<br>点击 + 新建</div>
      </div>

      <div class="divider"></div>

      <div class="section-hdr">
        场景对象
        <span id="obj-count" class="count-badge">0</span>
      </div>
      <div id="object-list">
        <div class="empty-state" id="obj-empty">请先选择场景</div>
      </div>

    </div>
  </div>

  <!-- 中央：Canvas 区域（2D / 3D 叠放） -->
  <div id="map-area">
    <div id="map-container">
      <canvas id="canvas-2d"></canvas>
      <canvas id="canvas-3d" style="display:none"></canvas>
      <div id="map-overlay" class="map-overlay">
        <p class="overlay-icon">🗺</p>
        <p>无计算结果</p>
        <p>添加声源后点击 <strong>▶ 计算</strong></p>
      </div>
    </div>
    <!-- 色阶图例 -->
    <div id="legend-bar">
      <span class="legend-label">dB(A)</span>
      <canvas id="legend-canvas"></canvas>
      <div id="legend-ticks">
        <span>35</span><span>40</span><span>45</span><span>50</span>
        <span>55</span><span>60</span><span>65</span><span>70</span><span>75+</span>
      </div>
      <span class="legend-label" style="margin-left:10px">热图透明度</span>
      <input id="heatmap-opacity" type="range" min="0" max="100" value="65"
             style="width:72px;height:4px;accent-color:var(--accent);cursor:pointer">
    </div>
  </div>

  <!-- 右侧面板：属性 / 命令输入 -->
  <div class="panel" id="right-panel-wrap">
    <div class="panel-hdr">属性</div>
    <div id="right-panel">

      <!-- 添加对象卡片 -->
      <div class="card" id="card-add-obj">
        <div class="card-title">添加对象</div>
        <div class="form-group">
          <label>类型</label>
          <select id="add-type">
            <option value="point">点声源</option>
            <option value="road">道路声源</option>
            <option value="barrier">噪声墙</option>
          </select>
        </div>
        <div class="form-group">
          <label>名称</label>
          <input id="add-name" type="text" placeholder="如：工厂 A">
        </div>
        <!-- 点声源专属 -->
        <div id="add-point-fields">
          <div class="form-row">
            <div class="form-group"><label>X (m)</label><input id="add-x" type="number" value="100"></div>
            <div class="form-group"><label>Y (m)</label><input id="add-y" type="number" value="100"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Z (m)</label><input id="add-z" type="number" value="1.5" step="0.5"></div>
            <div class="form-group"><label>Lw (dB)</label><input id="add-lw" type="number" value="80" min="0" max="140"></div>
          </div>
          <button class="btn-full" id="btn-add-point">+ 添加到场景</button>
        </div>
        <!-- 道路专属 -->
        <div id="add-road-fields" style="display:none">
          <div class="form-row">
            <div class="form-group"><label>声源高 (m)</label><input id="add-sh" type="number" value="0.05" step="0.05"></div>
            <div class="form-group"><label>采样间距 (m)</label><input id="add-ss" type="number" value="5" min="1"></div>
          </div>
          <button class="btn-full primary" id="btn-draw-road">✏ 进入绘制模式</button>
        </div>
        <!-- 噪声墙专属 -->
        <div id="add-barrier-fields" style="display:none">
          <div class="form-group">
            <label>墙高 (m)</label>
            <input id="add-height" type="number" value="3.0" step="0.5" min="0.5">
          </div>
          <button class="btn-full primary" id="btn-draw-barrier">✏ 进入绘制模式</button>
        </div>
        <div id="add-note" class="note">请先选择场景</div>
      </div>

      <!-- 命令输入卡片（变换 & 折线命令） -->
      <div class="card" id="card-cmd" style="display:none">
        <div class="card-title" id="cmd-title">命令</div>
        <div id="cmd-body"></div>
      </div>

      <!-- 选中对象属性卡片 -->
      <div class="card" id="card-selection" style="display:none">
        <div class="card-title">选中对象</div>
        <div id="selection-body"></div>
      </div>

      <!-- 计算设置卡片 -->
      <div class="card" id="card-calc">
        <div class="card-title">计算设置</div>
        <div class="form-group">
          <label>噪声指标</label>
          <select id="calc-metric">
            <option value="Lden">Lden（EU 昼晚夜）</option>
            <option value="Ldn">Ldn（FHWA 昼夜）</option>
            <option value="Leq">Leq（等效）</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group"><label>分辨率 (m)</label><input id="calc-res" type="number" value="10" min="1" max="100" step="5"></div>
          <div class="form-group"><label>范围 (m)</label><input id="calc-extent" type="number" value="500" min="100" step="100"></div>
        </div>
        <button class="btn-full primary" id="btn-run2">▶ 运行计算</button>
      </div>

      <!-- 计算结果卡片 -->
      <div class="card" id="card-results">
        <div class="card-title">计算结果</div>
        <div id="results-body">
          <div class="note">暂无结果</div>
        </div>
      </div>

    </div>
  </div>

</div><!-- #main -->

<!-- ══ STATUS BAR ════════════════════════════════════════════════════════ -->
<div id="statusbar">
  <span id="status-coords" class="mono">X: 0.0  Y: 0.0</span>
  <span class="sep-v">|</span>
  <span id="status-tool">选择</span>
  <span class="sep-v">|</span>
  <span id="status-hint" class="flex1 muted">就绪</span>
  <span class="status-chip chip-ready" id="status-chip">READY</span>
  <span class="sep-v">|</span>
  <span id="status-scenario" class="muted">未选场景</span>
</div>

<!-- Three.js CDN for 3D rendering -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"
        onerror="window._threeLoadFailed=true"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"
        onerror="window._threeLoadFailed=true"></script>

<script>
// ── Tauri bridge ────────────────────────────────────────────────────────
const invoke = window.__TAURI__?.core?.invoke
  ?? (async (cmd, args) => { console.warn('invoke stub:', cmd, args); throw new Error('Not in Tauri: ' + cmd); });
const saveDialog = window.__TAURI__?.dialog?.save ?? (async () => prompt('保存路径：'));

// ── 颜色工具 ────────────────────────────────────────────────────────────
const COLOR_STOPS = [
  [0.0,  [0,   0,   200]],
  [0.2,  [0,   200, 220]],
  [0.4,  [0,   200, 0  ]],
  [0.6,  [255, 230, 0  ]],
  [0.8,  [255, 100, 0  ]],
  [1.0,  [255, 0,   0  ]],
];
function dbToRGB(t) {
  t = Math.max(0, Math.min(1, t));
  for (let i = 0; i < COLOR_STOPS.length - 1; i++) {
    const [t0, c0] = COLOR_STOPS[i], [t1, c1] = COLOR_STOPS[i + 1];
    if (t <= t1) {
      const f = (t - t0) / (t1 - t0);
      return c0.map((v, j) => Math.round(v + f * (c1[j] - v)));
    }
  }
  return COLOR_STOPS[COLOR_STOPS.length - 1][1];
}
function dbToCSS(t) { const [r,g,b] = dbToRGB(t); return `rgb(${r},${g},${b})`; }

// ── 全局状态 ─────────────────────────────────────────────────────────────
const APP = {
  projects: [],
  currentProjectId: null,
  currentScenarioId: null,
  currentScenarioName: null,
  objects: [],
  calcResult: null,
  activeView: '2d',
  heatmapOpacity: 0.65,
  selectedIds: new Set(),
  tool: {
    mode: 'select',
    phase: 0,
    draftVerts: [],
    draftMouse: null,
    basePoint: null,
    cmdParams: {},
    previewObjs: [],
    joinFirst: null,
  },
  drag: {
    active: false, type: null,
    rowId: null, vertexIndex: null,
    startCanvas: null, startWorld: null,
    origPosition: null, origVertices: null,
  },
};

// ── Viewport2D ───────────────────────────────────────────────────────────
class Viewport2D {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d');
    this.originX = 250;
    this.originY = 250;
    this.scale   = 0.8;   // pixels/metre
    this._dirty  = false;
    this._dpr    = window.devicePixelRatio || 1;
    this.W = 0; this.H = 0;
  }

  resize() {
    const rect = this.canvas.parentElement.getBoundingClientRect();
    this.W = rect.width;
    this.H = rect.height;
    this.canvas.width  = this.W * this._dpr;
    this.canvas.height = this.H * this._dpr;
    this.canvas.style.width  = this.W + 'px';
    this.canvas.style.height = this.H + 'px';
    this.ctx.setTransform(this._dpr, 0, 0, this._dpr, 0, 0);
    this.requestRedraw();
  }

  worldToCanvas(wx, wy) {
    return {
      x: this.W / 2 + (wx - this.originX) * this.scale,
      y: this.H / 2 - (wy - this.originY) * this.scale,
    };
  }

  canvasToWorld(cx, cy) {
    return {
      x: this.originX + (cx - this.W / 2) / this.scale,
      y: this.originY - (cy - this.H / 2) / this.scale,
    };
  }

  pan(dx, dy) {
    this.originX -= dx / this.scale;
    this.originY += dy / this.scale;
    this.requestRedraw();
  }

  zoomAt(cx, cy, factor) {
    const wp = this.canvasToWorld(cx, cy);
    this.scale = Math.max(0.002, Math.min(2000, this.scale * factor));
    this.originX = wp.x - (cx - this.W / 2) / this.scale;
    this.originY = wp.y + (cy - this.H / 2) / this.scale;
    this.requestRedraw();
  }

  fitToObjects(objects, calcResult) {
    const pts = [];
    for (const o of objects) {
      if (o.position) pts.push([o.position[0], o.position[1]]);
      if (o.vertices) o.vertices.forEach(v => pts.push([v[0], v[1]]));
    }
    if (calcResult) {
      const r = calcResult;
      pts.push([r.xmin, r.ymin]);
      pts.push([r.xmin + r.nx * r.cellsize, r.ymin + r.ny * r.cellsize]);
    }
    if (!pts.length) return;
    const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const rangeX = (maxX - minX) || 200, rangeY = (maxY - minY) || 200;
    this.scale   = Math.min(this.W / rangeX, this.H / rangeY) / 1.35;
    this.originX = (minX + maxX) / 2;
    this.originY = (minY + maxY) / 2;
    this.requestRedraw();
  }

  getGridSpacing() {
    const target = 80; // ideal pixel spacing
    let step = Math.pow(10, Math.floor(Math.log10(target / this.scale)));
    for (const m of [1, 2, 5, 10]) {
      if (step * m * this.scale >= 40) return step * m;
    }
    return step * 10;
  }

  requestRedraw() {
    if (this._dirty) return;
    this._dirty = true;
    requestAnimationFrame(() => { this._dirty = false; Renderer2D.draw(); });
  }
}

// ── Renderer2D ───────────────────────────────────────────────────────────
const Renderer2D = {
  vp: null,

  draw() {
    if (!this.vp || APP.activeView !== '2d') return;
    const { ctx, W, H } = this.vp;
    ctx.clearRect(0, 0, W, H);
    this._drawGrid();
    this._drawHeatmap();
    this._drawObjects();
    this._drawDraft();
    this._drawPreview();
    this._drawSelection();
    this._drawAxisIndicator();
  },

  _drawGrid() {
    const { ctx, W, H } = this.vp;
    const step = this.vp.getGridSpacing();

    const wl = this.vp.canvasToWorld(0, 0).x;
    const wr = this.vp.canvasToWorld(W, 0).x;
    const wb = this.vp.canvasToWorld(0, H).y;
    const wt = this.vp.canvasToWorld(0, 0).y;

    ctx.save();
    ctx.strokeStyle = '#1c2128';
    ctx.lineWidth   = 0.5;

    // 垂直格线
    const x0 = Math.floor(wl / step) * step;
    for (let wx = x0; wx <= wr + step; wx += step) {
      const { x } = this.vp.worldToCanvas(wx, 0);
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    // 水平格线
    const y0 = Math.floor(wb / step) * step;
    for (let wy = y0; wy <= wt + step; wy += step) {
      const { y } = this.vp.worldToCanvas(0, wy);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // 坐标标签（每 5 格）
    ctx.fillStyle = '#3d444d';
    ctx.font = '10px monospace';
    const lx0 = Math.floor(wl / (step * 5)) * (step * 5);
    for (let wx = lx0; wx <= wr + step * 5; wx += step * 5) {
      const { x } = this.vp.worldToCanvas(wx, 0);
      ctx.textAlign = 'center';
      ctx.fillText(wx.toFixed(0), x, H - 3);
    }
    const ly0 = Math.floor(wb / (step * 5)) * (step * 5);
    for (let wy = ly0; wy <= wt + step * 5; wy += step * 5) {
      const { y } = this.vp.worldToCanvas(0, wy);
      ctx.textAlign = 'left';
      ctx.fillText(wy.toFixed(0), 3, y - 2);
    }

    // 原点十字
    const o = this.vp.worldToCanvas(0, 0);
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(o.x - 10, o.y); ctx.lineTo(o.x + 10, o.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(o.x, o.y - 10); ctx.lineTo(o.x, o.y + 10); ctx.stroke();

    ctx.restore();
  },

  _drawAxisIndicator() {
    const { ctx, H } = this.vp;
    const ox = 38, oy = H - 38, L = 26;
    ctx.save();
    ctx.lineWidth = 2;
    // X 轴（红）
    ctx.strokeStyle = '#f85149'; ctx.fillStyle = '#f85149';
    ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox + L, oy); ctx.stroke();
    ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('X', ox + L + 3, oy + 4);
    // Y 轴（绿）
    ctx.strokeStyle = '#3fb950'; ctx.fillStyle = '#3fb950';
    ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox, oy - L); ctx.stroke();
    ctx.textAlign = 'center';
    ctx.fillText('Y', ox, oy - L - 4);
    // 原点
    ctx.fillStyle = '#484f58';
    ctx.beginPath(); ctx.arc(ox, oy, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  },

  _drawHeatmap() {
    const res = APP.calcResult;
    if (!res || !res.levels?.length || APP.heatmapOpacity <= 0) return;
    const { ctx } = this.vp;
    const { levels, nx, ny, xmin, ymin, cellsize, min_db, max_db } = res;
    const minDb = min_db ?? 35;
    const maxDb = max_db ?? 75;
    const range = Math.max(maxDb - minDb, 1);

    // Pixel size of one grid cell
    const pa = this.vp.worldToCanvas(0, 0);
    const pb = this.vp.worldToCanvas(cellsize, cellsize);
    const cw = Math.max(1, Math.ceil(Math.abs(pb.x - pa.x) + 0.5));
    const ch = Math.max(1, Math.ceil(Math.abs(pb.y - pa.y) + 0.5));

    ctx.save();
    ctx.globalAlpha = APP.heatmapOpacity;
    for (let iy = 0; iy < ny; iy++) {
      for (let ix = 0; ix < nx; ix++) {
        const db = levels[iy * nx + ix];
        if (!isFinite(db)) continue;
        const t = Math.max(0, Math.min(1, (db - minDb) / range));
        const [r, g, b] = dbToRGB(t);
        const wx = xmin + (ix + 0.5) * cellsize;
        const wy = ymin + (iy + 0.5) * cellsize;
        const p  = this.vp.worldToCanvas(wx - cellsize / 2, wy + cellsize / 2);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(p.x, p.y, cw, ch);
      }
    }
    ctx.restore();
  },

  _drawObjects() {
    if (!APP.objects.length) return;
    const { ctx } = this.vp;
    ctx.save();
    APP.objects.forEach(obj => {
      const sel = APP.selectedIds.has(obj.row_id);
      if (obj.object_type === 'point_source' && obj.position) {
        const p = this.vp.worldToCanvas(obj.position[0], obj.position[1]);
        ctx.strokeStyle = sel ? '#79c0ff' : '#1f6feb';
        ctx.fillStyle   = sel ? 'rgba(121,192,255,0.25)' : 'rgba(31,111,235,0.18)';
        ctx.lineWidth   = sel ? 2.5 : 1.5;
        ctx.beginPath(); ctx.arc(p.x, p.y, 9, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // Cross
        ctx.beginPath();
        ctx.moveTo(p.x - 6, p.y); ctx.lineTo(p.x + 6, p.y);
        ctx.moveTo(p.x, p.y - 6); ctx.lineTo(p.x, p.y + 6);
        ctx.stroke();
      } else if (obj.object_type === 'road_source' && obj.vertices && obj.vertices.length >= 2) {
        ctx.strokeStyle = sel ? '#7ee787' : '#3fb950';
        ctx.lineWidth   = sel ? 3.5 : 2;
        ctx.lineJoin    = 'round';
        ctx.beginPath();
        obj.vertices.forEach((v, i) => {
          const p = this.vp.worldToCanvas(v[0], v[1]);
          i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
      } else if (obj.object_type === 'barrier' && obj.vertices && obj.vertices.length >= 2) {
        ctx.strokeStyle = sel ? '#ffa657' : '#d18616';
        ctx.lineWidth   = sel ? 5 : 3.5;
        ctx.lineJoin    = 'round';
        ctx.lineCap     = 'square';
        ctx.beginPath();
        obj.vertices.forEach((v, i) => {
          const p = this.vp.worldToCanvas(v[0], v[1]);
          i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
      }
    });
    ctx.restore();
  },

  _drawDraft() {
    const t = APP.tool;
    if (!['road','barrier','point'].includes(t.mode)) return;
    if (!t.draftVerts.length && !t.draftMouse) return;
    const { ctx } = this.vp;
    ctx.save();
    const isBarrier = t.mode === 'barrier';
    ctx.strokeStyle = isBarrier ? '#ffa657' : (t.mode === 'road' ? '#7ee787' : '#79c0ff');
    ctx.lineWidth   = isBarrier ? 3 : 2;
    ctx.setLineDash([6, 4]);
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    if (t.draftVerts.length >= 1) {
      ctx.beginPath();
      t.draftVerts.forEach((v, i) => {
        const p = this.vp.worldToCanvas(v[0], v[1]);
        i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
      });
      // Rubber-band to mouse
      if (t.draftMouse) {
        const pm = this.vp.worldToCanvas(t.draftMouse[0], t.draftMouse[1]);
        ctx.lineTo(pm.x, pm.y);
      }
      ctx.stroke();
    }
    // Vertex dots
    ctx.setLineDash([]);
    ctx.fillStyle = ctx.strokeStyle;
    t.draftVerts.forEach(v => {
      const p = this.vp.worldToCanvas(v[0], v[1]);
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
    });
    // Point preview circle
    if (t.mode === 'point' && t.draftMouse) {
      const pm = this.vp.worldToCanvas(t.draftMouse[0], t.draftMouse[1]);
      ctx.strokeStyle = '#79c0ff'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(pm.x, pm.y, 9, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pm.x-6, pm.y); ctx.lineTo(pm.x+6, pm.y);
      ctx.moveTo(pm.x, pm.y-6); ctx.lineTo(pm.x, pm.y+6);
      ctx.stroke();
    }
    ctx.restore();
  },

  _drawPreview() {
    const t = APP.tool;
    // Segment highlight for trim / break (drawn even without previewObjs)
    if ((t.mode === 'trim' || t.mode === 'break') && t.cmdParams?.lastHit) {
      const { obj, segIdx } = t.cmdParams.lastHit;
      if (obj.vertices && segIdx < obj.vertices.length - 1) {
        const { ctx } = this.vp;
        const a = this.vp.worldToCanvas(obj.vertices[segIdx][0],   obj.vertices[segIdx][1]);
        const b = this.vp.worldToCanvas(obj.vertices[segIdx+1][0], obj.vertices[segIdx+1][1]);
        ctx.save();
        ctx.strokeStyle = t.mode === 'trim' ? '#f85149' : '#f0883e';
        ctx.lineWidth   = 5; ctx.globalAlpha = 0.75; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.restore();
      }
    }
    if (!t.previewObjs.length) return;
    const { ctx } = this.vp;
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.setLineDash([5, 4]);
    t.previewObjs.forEach(obj => {
      ctx.strokeStyle = '#58a6ff';
      ctx.fillStyle   = 'rgba(88,166,255,0.15)';
      if (obj.object_type === 'point_source' && obj.position) {
        const p = this.vp.worldToCanvas(obj.position[0], obj.position[1]);
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(p.x, p.y, 9, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(p.x-6,p.y); ctx.lineTo(p.x+6,p.y);
        ctx.moveTo(p.x,p.y-6); ctx.lineTo(p.x,p.y+6);
        ctx.stroke();
      } else {
        const verts = obj.vertices || [];
        if (verts.length < 2) return;
        ctx.lineWidth = obj.object_type === 'barrier' ? 4 : 2.5;
        ctx.lineJoin  = 'round';
        ctx.beginPath();
        verts.forEach((v, i) => {
          const p = this.vp.worldToCanvas(v[0], v[1]);
          i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
      }
    });
    // Arrow from base → mouse for move/copy
    const mode = t.mode;
    if ((mode === 'move' || mode === 'copy') && t.basePoint && t.draftMouse && t.phase === 2) {
      const a = this.vp.worldToCanvas(t.basePoint.x, t.basePoint.y);
      const b = this.vp.worldToCanvas(t.draftMouse[0], t.draftMouse[1]);
      ctx.globalAlpha  = 0.7;
      ctx.strokeStyle  = '#58a6ff';
      ctx.fillStyle    = '#58a6ff';
      ctx.lineWidth    = 1.5;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      const ang = Math.atan2(b.y - a.y, b.x - a.x);
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x - 10*Math.cos(ang-0.4), b.y - 10*Math.sin(ang-0.4));
      ctx.lineTo(b.x - 10*Math.cos(ang+0.4), b.y - 10*Math.sin(ang+0.4));
      ctx.closePath(); ctx.fill();
    }
    // Mirror axis line
    if (mode === 'mirror' && t.basePoint && t.draftMouse) {
      const a = this.vp.worldToCanvas(t.basePoint.x, t.basePoint.y);
      const b = this.vp.worldToCanvas(t.draftMouse[0], t.draftMouse[1]);
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = '#f0883e';
      ctx.lineWidth   = 1.5;
      ctx.setLineDash([8, 4]);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
    ctx.restore();
  },

  _drawSelection() {
    if (!APP.selectedIds.size) return;
    const { ctx } = this.vp;
    ctx.save();
    APP.objects.forEach(obj => {
      if (!APP.selectedIds.has(obj.row_id)) return;
      const verts = obj.object_type === 'point_source'
        ? (obj.position ? [obj.position] : [])
        : (obj.vertices || []);
      verts.forEach((v, i) => {
        const p = this.vp.worldToCanvas(v[0], v[1]);
        const isActive = APP.drag.active
          && APP.drag.rowId === obj.row_id
          && APP.drag.vertexIndex === i;
        ctx.fillStyle   = isActive ? '#58a6ff' : '#e6edf3';
        ctx.strokeStyle = '#58a6ff';
        ctx.lineWidth   = 1.5;
        ctx.beginPath();
        ctx.rect(p.x - 4, p.y - 4, 8, 8);
        ctx.fill(); ctx.stroke();
      });
    });
    ctx.restore();
  },
};

// ── 事件处理：pan / zoom / 坐标 ──────────────────────────────────────────
let _spaceDown = false;
let _panState  = null;   // { sx, sy, ox, oy }

function initCanvasEvents(canvas) {
  // 滚轮缩放
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.18 : 0.85;
    vp.zoomAt(e.offsetX, e.offsetY, factor);
  }, { passive: false });

  // 鼠标按下
  canvas.addEventListener('mousedown', e => {
    // Tool-specific logic handled below
    const isPan = e.button === 1 || (e.button === 0 && _spaceDown)
                  || APP.tool.mode === 'pan';
    if (isPan && e.button !== 2) {
      _panState = { sx: e.offsetX, sy: e.offsetY, ox: vp.originX, oy: vp.originY };
      canvas.style.cursor = 'grabbing';
      e.preventDefault();
      return;
    }
    TC.onMouseDown(e);
  });

  // 鼠标移动
  canvas.addEventListener('mousemove', e => {
    if (_panState) {
      const dx = e.offsetX - _panState.sx;
      const dy = e.offsetY - _panState.sy;
      vp.originX = _panState.ox - dx / vp.scale;
      vp.originY = _panState.oy + dy / vp.scale;
      vp.requestRedraw();
    }
    TC.onMouseMove(e);
    // 状态栏坐标
    const w = vp.canvasToWorld(e.offsetX, e.offsetY);
    document.getElementById('status-coords').textContent =
      `X: ${w.x.toFixed(1)}  Y: ${w.y.toFixed(1)}`;
  });

  // 鼠标抬起
  canvas.addEventListener('mouseup', e => {
    if (_panState) {
      _panState = null;
      canvas.style.cursor = APP.tool.mode === 'pan' ? 'grab' : 'crosshair';
      return;
    }
    TC.onMouseUp(e);
  });

  // 双击
  canvas.addEventListener('dblclick', e => { TC.onDblClick(e); });

  // 鼠标离开画布 — 清除 rubber-band
  canvas.addEventListener('mouseleave', () => {
    APP.tool.draftMouse = null;
    vp.requestRedraw();
  });
}

// 键盘
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { _spaceDown = true; e.preventDefault(); }
  const map = { s:'select',p:'point',r:'road',b:'barrier',h:'pan',
                m:'move', f_key:'fit' };
  const k = e.key.toLowerCase();
  if (k === 'f') { vp.fitToObjects(APP.objects, APP.calcResult); return; }
  if (map[k]) { setActiveTool(map[k]); return; }
  if (k === 'escape') {
    APP.tool.previewObjs = [];
    APP.tool.phase = 0;
    APP.tool.cmdParams = {};
    if (['move','rotate','scale','mirror','copy'].includes(APP.tool.mode)
        || PolylineCmdController.MODES.includes(APP.tool.mode)) {
      setActiveTool('select');
      return;
    }
    TC._cancelDraft();
  }
  if (k === 'delete' || k === 'backspace') {
    if (!APP.selectedIds.size || !APP.currentScenarioId) return;
    Promise.all([...APP.selectedIds].map(id =>
      invoke('delete_object', { scenarioId: APP.currentScenarioId, rowId: id })
        .catch(err => console.warn('remove_object failed:', err))
    )).then(() => loadObjects());
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') _spaceDown = false;
});

// ── 工具按钮切换 ─────────────────────────────────────────────────────────
function setActiveTool(mode) {
  APP.tool.mode = mode;
  APP.tool.phase = 0;
  document.querySelectorAll('.tool-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === mode);
  });
  const names = {
    select:'选择',point:'放置点声源',road:'绘制道路',barrier:'绘制噪声墙',pan:'平移',
    move:'平移变换',rotate:'旋转',scale:'缩放',mirror:'镜像',copy:'复制',
    trim:'修剪',break:'打断',join:'合并',offset:'偏移',extend:'延伸',
  };
  document.getElementById('status-tool').textContent = names[mode] || mode;
  const hints = {
    select:'点击选中对象，拖拽移动',
    point:'点击画布放置点声源',
    road:'单击添加顶点，双击完成，Esc取消',
    barrier:'单击添加顶点，双击完成，Esc取消',
    pan:'拖拽平移视图',
    move:'选中对象后：点击基点→点击目标点',
    rotate:'选中对象后：点击基点→输入角度',
    scale:'选中对象后：点击基点→输入比例',
    mirror:'选中对象后：点击轴线两端点',
    copy:'选中对象后：点击基点→点击目标点',
    trim:'点击折线端段修剪',
    break:'点击折线位置打断',
    join:'依次点击两条折线合并',
    offset:'右侧输入距离后点击折线',
    extend:'点击折线端点→点击延伸目标',
  };
  document.getElementById('status-hint').textContent = hints[mode] || '';
  const canvas2d = document.getElementById('canvas-2d');
  canvas2d.style.cursor = mode === 'pan' ? 'grab' : 'crosshair';
  if (['move','rotate','scale','mirror','copy'].includes(mode)) {
    CmdController.start(mode);
  } else if (PolylineCmdController.MODES.includes(mode)) {
    PolylineCmdController.start(mode);
  } else {
    APP.tool.previewObjs = [];
    APP.tool.phase = 0;
    APP.tool.cmdParams = {};
    if (typeof UIController !== 'undefined') UIController.updateCmdPanel();
  }
}

// ── SceneRenderer3D (R3D) ─────────────────────────────────────────────────
const R3D = {
  renderer: null, scene: null, camera: null, controls: null,
  _rafId: null, _running: false, _initialized: false,

  init() {
    if (this._initialized) return true;
    if (typeof THREE === 'undefined') return false;
    const canvas = document.getElementById('canvas-3d');
    const W = canvas.offsetWidth || 800, H = canvas.offsetHeight || 600;

    this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.setSize(W, H);
    this.renderer.shadowMap.enabled = true;
    this.renderer.setClearColor(0x0a0e14, 1);

    this.scene = new THREE.Scene();
    this.scene.fog = new THREE.FogExp2(0x0a0e14, 0.003);

    this.camera = new THREE.PerspectiveCamera(50, W / H, 0.5, 20000);
    this.camera.position.set(0, 300, 400);
    this.camera.lookAt(0, 0, 0);

    // Lights
    this.scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const sun = new THREE.DirectionalLight(0xffffff, 0.85);
    sun.position.set(200, 400, 200);
    sun.castShadow = true;
    this.scene.add(sun);
    const fill = new THREE.DirectionalLight(0x8888ff, 0.25);
    fill.position.set(-200, 100, -100);
    this.scene.add(fill);

    // Ground plane
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(4000, 4000),
      new THREE.MeshLambertMaterial({ color: 0x111a11 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    this.scene.add(ground);

    // Grid
    const grid = new THREE.GridHelper(2000, 200, 0x1c2128, 0x1c2128);
    this.scene.add(grid);

    // OrbitControls
    const OC = THREE.OrbitControls || (window.THREE && THREE.OrbitControls);
    if (OC) {
      this.controls = new OC(this.camera, canvas);
      this.controls.enableDamping   = true;
      this.controls.dampingFactor   = 0.08;
      this.controls.screenSpacePanning = true;
      this.controls.maxPolarAngle   = Math.PI * 0.48;
      this.controls.minDistance     = 5;
      this.controls.maxDistance     = 8000;
    }

    this._initialized = true;
    return true;
  },

  sync() {
    if (!this._initialized && !this.init()) return;
    // Remove previous objects group
    const old = this.scene.getObjectByName('noise_objs');
    if (old) this.scene.remove(old);

    const group = new THREE.Group();
    group.name = 'noise_objs';
    const mat = {
      ps:      new THREE.MeshLambertMaterial({ color: 0x1f6feb }),
      road:    new THREE.MeshLambertMaterial({ color: 0x3fb950 }),
      barrier: new THREE.MeshLambertMaterial({ color: 0xd18616 }),
      pole:    new THREE.MeshLambertMaterial({ color: 0x484f58 }),
    };

    APP.objects.forEach(obj => {
      // Three.js coord: (wx, elevation, -wy)
      if (obj.object_type === 'point_source' && obj.position) {
        const [wx, wy, wz] = obj.position;
        const elev = wz || 1.5;
        // Sphere coloured by Lw (blue 60 dB → red 100 dB)
        const t = Math.max(0, Math.min(1, ((obj.lw_db || 80) - 60) / 40));
        const col = new THREE.Color().setHSL(0.67 * (1 - t), 0.9, 0.55);
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(1.8, 10, 10),
          new THREE.MeshLambertMaterial({ color: col })
        );
        sphere.position.set(wx, elev, -wy);
        sphere.castShadow = true;
        group.add(sphere);
        // Pole
        const pole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.25, 0.25, elev, 6),
          mat.pole
        );
        pole.position.set(wx, elev / 2, -wy);
        group.add(pole);

      } else if (obj.object_type === 'road_source' && obj.vertices?.length >= 2) {
        const v = obj.vertices;
        for (let i = 0; i < v.length - 1; i++) {
          const [ax, ay, az=0] = v[i], [bx, by, bz=0] = v[i+1];
          const dx = bx-ax, dy = -(by-ay), dz = az;
          const len = Math.sqrt(dx*dx + dy*dy);
          if (len < 0.01) continue;
          const box = new THREE.Mesh(
            new THREE.BoxGeometry(len, 0.3, 1.2),
            mat.road
          );
          box.position.set((ax+bx)/2, 0.15, -(ay+by)/2);
          box.rotation.y = Math.atan2(dy, dx);
          group.add(box);
        }

      } else if (obj.object_type === 'barrier' && obj.vertices?.length >= 2) {
        const v   = obj.vertices;
        const h   = obj.height_m || 3.0;
        for (let i = 0; i < v.length - 1; i++) {
          const [ax, ay] = v[i], [bx, by] = v[i+1];
          const dx = bx-ax, dy = -(by-ay);
          const len = Math.sqrt(dx*dx + dy*dy);
          if (len < 0.01) continue;
          const box = new THREE.Mesh(
            new THREE.BoxGeometry(len, h, 0.45),
            mat.barrier
          );
          box.position.set((ax+bx)/2, h/2, -(ay+by)/2);
          box.rotation.y = Math.atan2(dy, dx);
          box.castShadow  = true;
          box.receiveShadow = true;
          group.add(box);
        }
      }
    });
    this.scene.add(group);
    this._fitCamera();
  },

  _fitCamera() {
    const allPts = APP.objects.flatMap(o => {
      if (o.object_type === 'point_source' && o.position) return [[o.position[0], -o.position[1]]];
      return (o.vertices || []).map(v => [v[0], -v[1]]);
    });
    if (!allPts.length) return;
    const xs = allPts.map(p => p[0]), zs = allPts.map(p => p[1]);
    const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
    const cz = (Math.min(...zs) + Math.max(...zs)) / 2;
    const span = Math.max(
      Math.max(...xs) - Math.min(...xs),
      Math.max(...zs) - Math.min(...zs),
      100
    );
    this.camera.position.set(cx, span * 0.7, cz + span * 0.9);
    this.camera.lookAt(cx, 0, cz);
    if (this.controls) {
      this.controls.target.set(cx, 0, cz);
      this.controls.update();
    }
  },

  start() {
    if (!this.init()) {
      // Three.js unavailable — show text fallback on the 2D canvas context
      const canvas = document.getElementById('canvas-3d');
      const W = canvas.offsetWidth || 800, H = canvas.offsetHeight || 600;
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0a0e14'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#484f58'; ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Three.js 未加载（网络离线？）— 3D 渲染不可用', W / 2, H / 2);
      return;
    }
    this.sync();
    this._running = true;
    const tick = () => {
      if (!this._running) return;
      this._rafId = requestAnimationFrame(tick);
      if (this.controls) this.controls.update();
      this.renderer.render(this.scene, this.camera);
    };
    tick();
  },

  stop() {
    this._running = false;
    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
  },

  resize() {
    if (!this._initialized || !this.renderer) return;
    const canvas = document.getElementById('canvas-3d');
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    if (!W || !H) return;
    this.renderer.setSize(W, H);
    this.camera.aspect = W / H;
    this.camera.updateProjectionMatrix();
  },
};

// ── 视图切换 ──────────────────────────────────────────────────────────────
function switchView(v) {
  APP.activeView = v;
  document.getElementById('canvas-2d').style.display = v === '2d' ? 'block' : 'none';
  document.getElementById('canvas-3d').style.display = v === '3d' ? 'block' : 'none';

  }
}

// ── 色阶图例 ─────────────────────────────────────────────────────────────
function drawLegend() {
  const canvas = document.getElementById('legend-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 200, H = 14;
  canvas.width = W; canvas.height = H;
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  COLOR_STOPS.forEach(([t, [r,g,b]]) => grad.addColorStop(t, `rgb(${r},${g},${b})`));

  ctx.fillRect(0, 0, W, H);
}

// ── 状态栏工具函数 ────────────────────────────────────────────────────────

// ── HitTest ──────────────────────────────────────────────────────────────
const HitTest = {
  POINT_R:  12,  // px — click radius for point sources
  EDGE_D:    7,  // px — click distance for polyline edges
  HANDLE_R:  6,  // px — half-size of vertex handle

  test(cx, cy) {
    // Vertex handles first (only selected objects)
    for (const obj of APP.objects) {
      if (!APP.selectedIds.has(obj.row_id)) continue;
      const verts = obj.object_type === 'point_source'
        ? (obj.position ? [obj.position] : [])
        : (obj.vertices || []);
      for (let i = 0; i < verts.length; i++) {
        const p = vp.worldToCanvas(verts[i][0], verts[i][1]);
        if (Math.abs(p.x - cx) <= this.HANDLE_R && Math.abs(p.y - cy) <= this.HANDLE_R)
          return { type: 'vertex', obj, vertexIndex: i };
      }
    }
    // Objects (reverse draw order → topmost first)
    for (let k = APP.objects.length - 1; k >= 0; k--) {
      const obj = APP.objects[k];
      if (obj.object_type === 'point_source' && obj.position) {
        const p = vp.worldToCanvas(obj.position[0], obj.position[1]);
        if (Math.hypot(p.x - cx, p.y - cy) <= this.POINT_R)
          return { type: 'object', obj };
      } else {
        const verts = obj.vertices || [];
        for (let i = 0; i < verts.length - 1; i++) {
          const a = vp.worldToCanvas(verts[i][0],   verts[i][1]);
          const b = vp.worldToCanvas(verts[i+1][0], verts[i+1][1]);
          if (this._distSeg(cx, cy, a, b) <= this.EDGE_D)
            return { type: 'object', obj };
        }
      }
    }
    return null;
  },

  _distSeg(px, py, a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const lenSq = dx*dx + dy*dy;
    if (lenSq === 0) return Math.hypot(px - a.x, py - a.y);
    const t = Math.max(0, Math.min(1, ((px-a.x)*dx + (py-a.y)*dy) / lenSq));
    return Math.hypot(px - (a.x + t*dx), py - (a.y + t*dy));
  },
};

// ── ToolController (TC) ──────────────────────────────────────────────────
const TC = {
  // Draw tools ──────────────────────────────────────────────────────────
  _startDraw(mode) {
    APP.tool.mode = mode;
    APP.tool.phase = 1;
    APP.tool.draftVerts = [];
    APP.tool.draftMouse = null;
  },

  _cancelDraft() {
    APP.tool.draftVerts = [];
    APP.tool.draftMouse = null;
    APP.tool.phase = 0;
    vp.requestRedraw();
    showStatus('已取消', 'ready');
  },

  async _finishPolyline() {
    const verts = APP.tool.draftVerts;
    if (verts.length < 2) { this._cancelDraft(); return; }
    if (!APP.currentScenarioId) { showStatus('请先选择场景', 'err'); return; }
    const mode = APP.tool.mode;
    this._cancelDraft();
    try {
      const name = mode === 'road'
        ? `道路声源_${APP.objects.length + 1}`
        : `噪声墙_${APP.objects.length + 1}`;
      if (mode === 'road') {
        const sh = parseFloat(document.getElementById('add-sh').value) || 0.05;
        await invoke('add_road_source', {
          scenarioId: APP.currentScenarioId, name,
          vertices: verts, sourceHeightM: sh,
        });
      } else {
        const h = parseFloat(document.getElementById('add-height').value) || 3.0;
        await invoke('add_barrier', {
          scenarioId: APP.currentScenarioId, name,
          vertices: verts, heightM: h,
        });
      }
      await loadObjects();
      renderObjectList();
    } catch(err) { showStatus('添加失败: ' + err, 'err'); }
  },

  onMouseDown(e) {
    if (e.button !== 0) return;
    const cx = e.offsetX, cy = e.offsetY;
    const w  = vp.canvasToWorld(cx, cy);

    // ── Transform commands ──
    if (['move','rotate','scale','mirror','copy'].includes(APP.tool.mode)) {
      CmdController.onMouseDown(e);
      return;
    }
    // ── Polyline commands ──
    if (PolylineCmdController.MODES.includes(APP.tool.mode)) {
      PolylineCmdController.onMouseDown(e);
      return;
    }

    // ── Draw: Point ──
    if (APP.tool.mode === 'point') {
      if (!APP.currentScenarioId) { showStatus('请先选择场景', 'err'); return; }
      const lw = parseFloat(document.getElementById('add-lw').value) || 80;
      const z  = parseFloat(document.getElementById('add-z').value)  || 1.5;
      const name = `点声源_${APP.objects.length + 1}`;
      invoke('add_point_source', {
        scenarioId: APP.currentScenarioId, name,
        x: w.x, y: w.y, z, lwDb: lw,
      }).then(() => { loadObjects().then(renderObjectList); })
        .catch(err => showStatus('添加失败: ' + err, 'err'));
      return;
    }

    // ── Draw: Road / Barrier ──
    if (APP.tool.mode === 'road' || APP.tool.mode === 'barrier') {
      if (!APP.currentScenarioId) { showStatus('请先选择场景', 'err'); return; }
      APP.tool.draftVerts.push([w.x, w.y, 0]);
      APP.tool.phase = 1;
      vp.requestRedraw();
      return;
    }

    // ── Select ──
    if (APP.tool.mode === 'select') {
      const hit = HitTest.test(cx, cy);
      if (hit && hit.type === 'vertex') {
        APP.drag.active      = true;
        APP.drag.type        = 'vertex';
        APP.drag.rowId       = hit.obj.row_id;
        APP.drag.vertexIndex = hit.vertexIndex;
        APP.drag.startWorld  = w;
        if (hit.obj.object_type === 'point_source') {
          APP.drag.origPosition = [...hit.obj.position];
        } else {
          APP.drag.origVertices = hit.obj.vertices.map(v => [...v]);
        }
        e.preventDefault();
      } else if (hit && hit.type === 'object') {
        if (!e.ctrlKey) APP.selectedIds = new Set();
        APP.selectedIds.add(hit.obj.row_id);
        APP.drag.active     = true;
        APP.drag.type       = 'object';
        APP.drag.rowId      = hit.obj.row_id;
        APP.drag.startWorld = w;
        if (hit.obj.object_type === 'point_source') {
          APP.drag.origPosition = [...hit.obj.position];
        } else {
          APP.drag.origVertices = hit.obj.vertices.map(v => [...v]);
        }
        _updateSelectionCard();
        vp.requestRedraw();
        e.preventDefault();
      } else {
        if (!e.ctrlKey) {
          APP.selectedIds = new Set();
          _updateSelectionCard();
          vp.requestRedraw();
        }
      }
    }
  },

  onMouseMove(e) {
    // Transform command preview
    if (['move','rotate','scale','mirror','copy'].includes(APP.tool.mode)) {
      CmdController.onMouseMove(e);
      return;
    }
    // Polyline command hover
    if (PolylineCmdController.MODES.includes(APP.tool.mode)) {
      PolylineCmdController.onMouseMove(e);
      return;
    }
    // Rubber-band for draw tools
    if (APP.tool.phase === 1 && (APP.tool.mode === 'road' || APP.tool.mode === 'barrier')) {
      const w = vp.canvasToWorld(e.offsetX, e.offsetY);
      APP.tool.draftMouse = [w.x, w.y, 0];
      vp.requestRedraw();
      return;
    }
    if (APP.tool.mode === 'point') {
      const w = vp.canvasToWorld(e.offsetX, e.offsetY);
      APP.tool.draftMouse = [w.x, w.y, 0];
      vp.requestRedraw();
      return;
    }
    // Drag
    if (!APP.drag.active) return;
    const w  = vp.canvasToWorld(e.offsetX, e.offsetY);
    const dx = w.x - APP.drag.startWorld.x;
    const dy = w.y - APP.drag.startWorld.y;
    const obj = APP.objects.find(o => o.row_id === APP.drag.rowId);
    if (!obj) return;

    if (APP.drag.type === 'vertex') {
      const vi = APP.drag.vertexIndex;
      if (obj.object_type === 'point_source') {
        obj.position = [
          APP.drag.origPosition[0] + dx,
          APP.drag.origPosition[1] + dy,
          APP.drag.origPosition[2] || 0,
        ];
      } else {
        obj.vertices[vi] = [
          APP.drag.origVertices[vi][0] + dx,
          APP.drag.origVertices[vi][1] + dy,
          APP.drag.origVertices[vi][2] || 0,
        ];
      }
    } else {
      if (obj.object_type === 'point_source') {
        obj.position = [
          APP.drag.origPosition[0] + dx,
          APP.drag.origPosition[1] + dy,
          APP.drag.origPosition[2] || 0,
        ];
      } else {
        obj.vertices = APP.drag.origVertices.map(v => [v[0]+dx, v[1]+dy, v[2]||0]);
      }
    }
    vp.requestRedraw();
  },

  async onMouseUp(e) {
    if (!APP.drag.active) return;
    APP.drag.active = false;
    const obj = APP.objects.find(o => o.row_id === APP.drag.rowId);
    if (obj && APP.currentScenarioId) {
      try {
        if (obj.object_type === 'point_source') {
          await invoke('update_object_geometry', {
            scenarioId: APP.currentScenarioId,
            rowId: obj.row_id,
            position: obj.position,
            vertices: null,
          });
        } else {
          await invoke('update_object_geometry', {
            scenarioId: APP.currentScenarioId,
            rowId: obj.row_id,
            position: null,
            vertices: obj.vertices,
          });
        }
      } catch(err) { showStatus('保存失败: ' + err, 'err'); }
    }
    APP.drag = {
      active:false, type:null, rowId:null, vertexIndex:null,
      startCanvas:null, startWorld:null, origPosition:null, origVertices:null,
    };
    _updateSelectionCard();
    vp.requestRedraw();
  },

  onDblClick(e) {
    if (APP.tool.mode === 'road' || APP.tool.mode === 'barrier') {
      // Remove the last vertex added by mousedown on this dblclick
      if (APP.tool.draftVerts.length > 0) APP.tool.draftVerts.pop();
      this._finishPolyline();
    }
  },
};

// ── Preview helpers ──────────────────────────────────────────────────────
function _cloneObj(obj) { return JSON.parse(JSON.stringify(obj)); }

function _buildTranslatePreview(dx, dy) {
  return APP.objects.filter(o => APP.selectedIds.has(o.row_id)).map(obj => {
    const c = _cloneObj(obj);
    if (c.position) c.position = [c.position[0]+dx, c.position[1]+dy, c.position[2]||0];
    if (c.vertices) c.vertices = c.vertices.map(v => [v[0]+dx, v[1]+dy, v[2]||0]);
    return c;
  });
}

function _buildMirrorPreview(x1, y1, x2, y2) {
  const dx = x2-x1, dy = y2-y1, lenSq = dx*dx + dy*dy;
  if (lenSq < 1e-10) return [];
  function mirrorPt(px, py) {
    const t = ((px-x1)*dx + (py-y1)*dy) / lenSq;
    return [2*(x1+t*dx)-px, 2*(y1+t*dy)-py];
  }
  return APP.objects.filter(o => APP.selectedIds.has(o.row_id)).map(obj => {
    const c = _cloneObj(obj);
    if (c.position) { const [mx,my] = mirrorPt(c.position[0],c.position[1]); c.position=[mx,my,c.position[2]||0]; }
    if (c.vertices) c.vertices = c.vertices.map(v => { const [mx,my]=mirrorPt(v[0],v[1]); return [mx,my,v[2]||0]; });
    return c;
  });
}

// ── PolylineCmdController ────────────────────────────────────────────────
const PolylineCmdController = {
  MODES: ['trim','break','join','offset','extend'],

  start(mode) {
    APP.tool.phase      = 1;
    APP.tool.joinFirst  = null;
    APP.tool.cmdParams  = {};
    APP.tool.previewObjs = [];
    APP.tool.draftMouse  = null;
    UIController.updateCmdPanel();
    const hints = {
      trim:   '点击折线段，靠近哪端则修剪该端',
      break:  '点击折线任意位置打断',
      join:   '点击第一条折线',
      offset: '设置右侧距离后点击折线',
      extend: '点击折线端点',
    };
    showStatus(hints[mode] || '', 'ready');
  },

  // Find nearest segment hit → { obj, segIdx, t, dist }
  _hitSeg(cx, cy) {
    let best = null;
    for (const obj of APP.objects) {
      if (!obj.vertices || obj.vertices.length < 2) continue;
      for (let i = 0; i < obj.vertices.length - 1; i++) {
        const a = vp.worldToCanvas(obj.vertices[i][0],   obj.vertices[i][1]);
        const b = vp.worldToCanvas(obj.vertices[i+1][0], obj.vertices[i+1][1]);
        const dist = HitTest._distSeg(cx, cy, a, b);
        if (dist > HitTest.EDGE_D) continue;
        const dx = b.x-a.x, dy = b.y-a.y, lenSq = dx*dx+dy*dy;
        const tSeg = lenSq < 1e-10 ? 0
          : Math.max(0, Math.min(1, ((cx-a.x)*dx+(cy-a.y)*dy)/lenSq));
        if (!best || dist < best.dist) best = { obj, segIdx:i, t:tSeg, dist };
      }
    }
    return best;
  },

  // Find first/last vertex near canvas point → { obj, vertexIndex }
  _hitEndVertex(cx, cy) {
    const R = HitTest.HANDLE_R + 5;
    for (const obj of APP.objects) {
      if (!obj.vertices || obj.vertices.length < 2) continue;
      const n = obj.vertices.length;
      for (const vi of [0, n-1]) {
        const p = vp.worldToCanvas(obj.vertices[vi][0], obj.vertices[vi][1]);
        if (Math.abs(p.x-cx) <= R && Math.abs(p.y-cy) <= R)
          return { obj, vertexIndex: vi };
      }
    }
    return null;
  },

  async onMouseDown(e) {
    if (e.button !== 0) return;
    const cx = e.offsetX, cy = e.offsetY;
    const w  = vp.canvasToWorld(cx, cy);
    const mode = APP.tool.mode;

    // ── Trim ──────────────────────────────────────────────────────────────
    if (mode === 'trim') {
      const hit = this._hitSeg(cx, cy);
      if (!hit) { showStatus('未命中折线', 'err'); return; }
      const { obj, segIdx, t } = hit;
      // Which side is "nearer"? proportion along full polyline
      const nSeg = obj.vertices.length - 1;
      const trimStart = (segIdx + t) / nSeg < 0.5;
      await this._trimClientSide(obj, segIdx, t, trimStart);
    }

    // ── Break ──────────────────────────────────────────────────────────────
    else if (mode === 'break') {
      const hit = this._hitSeg(cx, cy);
      if (!hit) { showStatus('未命中折线', 'err'); return; }
      try {
        await invoke('break_polyline', {
          scenarioId: APP.currentScenarioId,
          rowId: hit.obj.row_id, segIdx: hit.segIdx, t: hit.t,
        });
        APP.tool.cmdParams.lastHit = null;
        await loadObjects(); renderObjectList();
      } catch(err) {
        // fallback: client-side break
        await this._breakClientSide(hit.obj, hit.segIdx, hit.t);
      }
    }

    // ── Join ───────────────────────────────────────────────────────────────
    else if (mode === 'join') {
      const hit = HitTest.test(cx, cy);
      const obj = hit?.obj;
      if (!obj || obj.object_type === 'point_source') { showStatus('请点击折线对象', 'err'); return; }
      if (!APP.tool.joinFirst) {
        APP.tool.joinFirst = obj.row_id;
        APP.selectedIds = new Set([obj.row_id]);
        document.getElementById('cmd-join-hint').textContent = '已选第一条，点击第二条折线';
        showStatus('点击第二条折线', 'ready');
        vp.requestRedraw();
      } else {
        if (obj.row_id === APP.tool.joinFirst) { showStatus('请点击不同的折线', 'err'); return; }
        try {
          await invoke('join_polylines', { rowIdA: APP.tool.joinFirst, rowIdB: obj.row_id });
          APP.tool.joinFirst = null;
          await loadObjects(); renderObjectList();
          setActiveTool('select');
        } catch(err) { showStatus('合并失败: ' + err, 'err'); }
      }
    }

    // ── Offset ─────────────────────────────────────────────────────────────
    else if (mode === 'offset') {
      const hit = HitTest.test(cx, cy);
      const obj = hit?.obj;
      if (!obj || obj.object_type === 'point_source') { showStatus('请点击折线对象', 'err'); return; }
      const dist = parseFloat(document.getElementById('cmd-offset-dist')?.value) || 5;
      try {
        await invoke('offset_polyline', {
          scenarioId: APP.currentScenarioId, rowId: obj.row_id, distance: dist,
        });
        await loadObjects(); renderObjectList();
      } catch(err) { showStatus('偏移失败: ' + err, 'err'); }
    }

    // ── Extend ─────────────────────────────────────────────────────────────
    else if (mode === 'extend') {
      if (APP.tool.phase === 1) {
        const hit = this._hitEndVertex(cx, cy);
        if (!hit) { showStatus('请点击折线端点（端部顶点附近）', 'err'); return; }
        APP.tool.cmdParams.extObj = hit.obj;
        APP.tool.cmdParams.extVi  = hit.vertexIndex;
        APP.tool.phase = 2;
        APP.selectedIds = new Set([hit.obj.row_id]);
        const lbl = document.getElementById('cmd-ext-hint');
        if (lbl) lbl.textContent = '点击目标位置';
        showStatus('点击目标点延伸', 'ready');
        vp.requestRedraw();
      } else if (APP.tool.phase === 2) {
        const { extObj, extVi } = APP.tool.cmdParams;
        const newVerts = extObj.vertices.map(v => [...v]);
        newVerts[extVi] = [w.x, w.y, newVerts[extVi][2] || 0];
        try {
          await invoke('update_object_geometry', {
            scenarioId: APP.currentScenarioId,
            rowId: extObj.row_id, position: null, vertices: newVerts,
          });
          APP.tool.phase = 1;
          APP.tool.cmdParams = {};
          APP.tool.previewObjs = [];
          const lbl = document.getElementById('cmd-ext-hint');
          if (lbl) lbl.textContent = '点击折线端点';
          showStatus('延伸完成，继续点击端点或切换工具', 'ready');
          await loadObjects(); renderObjectList();
        } catch(err) { showStatus('延伸失败: ' + err, 'err'); }
      }
    }
  },

  onMouseMove(e) {
    const mode = APP.tool.mode;
    const cx = e.offsetX, cy = e.offsetY;
    const w  = vp.canvasToWorld(cx, cy);
    APP.tool.draftMouse = [w.x, w.y, 0];

    if (mode === 'trim' || mode === 'break') {
      APP.tool.cmdParams.lastHit = this._hitSeg(cx, cy) || null;
    } else if (mode === 'extend' && APP.tool.phase === 2) {
      const { extObj, extVi } = APP.tool.cmdParams;
      if (extObj) {
        const c = _cloneObj(extObj);
        c.vertices[extVi] = [w.x, w.y, c.vertices[extVi][2] || 0];
        APP.tool.previewObjs = [c];
      }
    }
    vp.requestRedraw();
  },

  // Client-side trim: keep one side of the cut
  async _trimClientSide(obj, segIdx, t, trimStart) {
    const v = obj.vertices;
    const ax = v[segIdx][0], ay = v[segIdx][1], az = v[segIdx][2] || 0;
    const bx = v[segIdx+1][0], by = v[segIdx+1][1], bz = v[segIdx+1][2] || 0;
    const hx = ax + t*(bx-ax), hy = ay + t*(by-ay), hz = az + t*(bz-az);
    const newVerts = trimStart
      ? [[hx,hy,hz], ...v.slice(segIdx+1)]
      : [...v.slice(0, segIdx+1), [hx,hy,hz]];
    if (newVerts.length < 2) { showStatus('修剪后顶点不足', 'err'); return; }
    try {
      await invoke('update_object_geometry', {
        scenarioId: APP.currentScenarioId,
        rowId: obj.row_id, position: null, vertices: newVerts,
      });
      APP.tool.cmdParams.lastHit = null;
      await loadObjects(); renderObjectList();
    } catch(err) { showStatus('修剪失败: ' + err, 'err'); }
  },

  // Client-side break: split into two objects (both same type / properties)
  async _breakClientSide(obj, segIdx, t) {
    const v = obj.vertices;
    const ax = v[segIdx][0], ay = v[segIdx][1], az = v[segIdx][2] || 0;
    const bx = v[segIdx+1][0], by = v[segIdx+1][1], bz = v[segIdx+1][2] || 0;
    const hx = ax + t*(bx-ax), hy = ay + t*(by-ay), hz = az + t*(bz-az);
    const vertsA = [...v.slice(0, segIdx+1), [hx,hy,hz]];
    const vertsB = [[hx,hy,hz], ...v.slice(segIdx+1)];
    if (vertsA.length < 2 || vertsB.length < 2) { showStatus('打断位置无效', 'err'); return; }
    try {
      // Replace original with vertsA, add new object for vertsB
      await invoke('update_object_geometry', {
        scenarioId: APP.currentScenarioId,
        rowId: obj.row_id, position: null, vertices: vertsA,
      });
      const newName = obj.name + '_2';
      if (obj.object_type === 'road_source') {
        await invoke('add_road_source', {
          scenarioId: APP.currentScenarioId, name: newName,
          vertices: vertsB, sourceHeightM: obj.source_height_m || 0.05,
        });
      } else {
        await invoke('add_barrier', {
          scenarioId: APP.currentScenarioId, name: newName,
          vertices: vertsB, heightM: obj.height_m || 3.0,
        });
      }
      APP.tool.cmdParams.lastHit = null;
      await loadObjects(); renderObjectList();
    } catch(err) { showStatus('打断失败: ' + err, 'err'); }
  },
};

    const titles = {
      move:'平移', rotate:'旋转', scale:'缩放', mirror:'镜像', copy:'复制',
      trim:'修剪', break:'打断', join:'合并', offset:'偏移', extend:'延伸',
    };
    document.getElementById('cmd-title').textContent = titles[mode] || mode;

    const body = document.getElementById('cmd-body');
    if (mode === 'rotate') {
      body.innerHTML = `
        <div class="form-group"><label>角度 (°)</label>
          <input id="cmd-angle" type="number" value="90" step="5"></div>
        <div class="form-group"><label>基点</label>

        <button class="btn-full primary" id="cmd-apply">应用</button>
        <button class="btn-full" id="cmd-cancel">取消</button>`;

        <div class="form-group"><label>比例因子</label>
          <input id="cmd-scale" type="number" value="2" step="0.1" min="0.01"></div>
        <div class="form-group"><label>基点</label>
          <div class="note" id="cmd-bp-label">点击画布设置基点</div></div>
        <button class="btn-full primary" id="cmd-apply">应用</button>
        <button class="btn-full" id="cmd-cancel">取消</button>`;
    } else if (mode === 'mirror') {
      body.innerHTML = `
        <div class="form-group"><label>镜像轴</label>
          <div class="note" id="cmd-bp-label">点击两端点定义轴线</div></div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <input id="cmd-keep-orig" type="checkbox" checked style="width:auto;margin:0">
          <label style="display:inline;font-size:11px;margin:0">保留原始对象</label></div>
        <button class="btn-full" id="cmd-cancel">取消</button>`;
    } else if (mode === 'trim') {
      body.innerHTML = `
        <div class="note">点击折线：靠近哪端则修剪该端</div>
        <button class="btn-full" id="cmd-cancel">取消</button>`;
    } else if (mode === 'break') {
      body.innerHTML = `
        <div class="note">点击折线任意位置打断为两段</div>
        <button class="btn-full" id="cmd-cancel">取消</button>`;
    } else if (mode === 'join') {
      body.innerHTML = `
        <div class="note" id="cmd-join-hint">点击第一条折线</div>
        <button class="btn-full" id="cmd-cancel">取消</button>`;
    } else if (mode === 'offset') {
      body.innerHTML = `
        <div class="form-group"><label>偏移距离 (m)</label>
          <input id="cmd-offset-dist" type="number" value="5" step="0.5" min="0.1"></div>
        <div class="note">正值左偏，负值右偏；点击折线执行</div>
        <button class="btn-full" id="cmd-cancel">取消</button>`;
    } else if (mode === 'extend') {
      body.innerHTML = `
        <div class="note" id="cmd-ext-hint">点击折线端点</div>
        <button class="btn-full" id="cmd-cancel">取消</button>`;
    } else {
      body.innerHTML = `
        <div class="note" id="cmd-bp-label">${mode==='copy'?'点击基点 → 目标点（复制）':'点击基点 → 目标点'}</div>
        <button class="btn-full" id="cmd-cancel">取消</button>`;
    }

    document.getElementById('cmd-apply')?.addEventListener('click', () => CmdController._applyDirect());

// ── CmdController ────────────────────────────────────────────────────────
const CmdController = {
  start(mode) {
    if (!APP.selectedIds.size) { showStatus('请先选择对象', 'err'); setActiveTool('select'); return; }
    APP.tool.phase    = 1;
    APP.tool.basePoint = null;
    APP.tool.cmdParams = {};
    APP.tool.previewObjs = [];
    APP.tool.draftMouse  = null;
    UIController.updateCmdPanel();
    const hints = {
      move:'点击基点',copy:'点击基点',
      rotate:'点击旋转中心',scale:'点击缩放中心',
      mirror:'点击镜像轴第一点',
    };
    showStatus(hints[mode] || '', 'ready');
  },

  onMouseDown(e) {
    if (e.button !== 0) return;
    const w    = vp.canvasToWorld(e.offsetX, e.offsetY);
    const mode = APP.tool.mode;

    if (APP.tool.phase === 1) {
      APP.tool.basePoint = w;
      APP.tool.phase     = 2;
      const lbl = document.getElementById('cmd-bp-label');
      if (lbl) lbl.textContent = `(${w.x.toFixed(1)}, ${w.y.toFixed(1)})`;
      if (mode === 'rotate' || mode === 'scale') {
        showStatus('基点已设置 — 在右侧输入参数后点击「应用」', 'ready');
      } else if (mode === 'mirror') {
        showStatus('点击第二点完成轴线', 'ready');
      } else {
        showStatus('点击目标点', 'ready');
      }
      vp.requestRedraw();
    } else if (APP.tool.phase === 2) {
      if (mode === 'move' || mode === 'copy') {
        this._executeMoveOrCopy(mode, APP.tool.basePoint, w);
      } else if (mode === 'mirror') {
        this._executeMirror(APP.tool.basePoint, w);
      }
    }
  },

  onMouseMove(e) {
    const mode = APP.tool.mode;
    const w    = vp.canvasToWorld(e.offsetX, e.offsetY);
    APP.tool.draftMouse = [w.x, w.y, 0];
    if (APP.tool.phase === 2 && APP.tool.basePoint) {
      const bp = APP.tool.basePoint;
      if (mode === 'move' || mode === 'copy') {
        APP.tool.previewObjs = _buildTranslatePreview(w.x-bp.x, w.y-bp.y);
      } else if (mode === 'mirror') {
        APP.tool.previewObjs = _buildMirrorPreview(bp.x, bp.y, w.x, w.y);
      }
    }
    vp.requestRedraw();
  },

  async _executeMoveOrCopy(mode, base, target) {
    const dx = target.x - base.x, dy = target.y - base.y;
    const rowIds = [...APP.selectedIds];
    APP.tool.previewObjs = []; APP.tool.phase = 0; vp.requestRedraw();
    try {
      if (mode === 'move') {
        await invoke('move_objects', { rowIds, dx, dy, dz: 0 });
      } else {
        await invoke('copy_objects', { scenarioId: APP.currentScenarioId, rowIds, dx, dy });
      }
      await loadObjects(); renderObjectList(); setActiveTool('select');
    } catch(err) { showStatus('操作失败: ' + err, 'err'); }
  },

  async _executeMirror(p1, p2) {
    const rowIds = [...APP.selectedIds];
    const keepOriginal = document.getElementById('cmd-keep-orig')?.checked ?? true;
    APP.tool.previewObjs = []; APP.tool.phase = 0; vp.requestRedraw();
    try {
      await invoke('mirror_objects', {
        scenarioId: APP.currentScenarioId, rowIds,
        x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, keepOriginal,
      });
      await loadObjects(); renderObjectList(); setActiveTool('select');
    } catch(err) { showStatus('操作失败: ' + err, 'err'); }
  },

  async _applyDirect() {
    const mode   = APP.tool.mode;
    const rowIds = [...APP.selectedIds];
    const bp     = APP.tool.basePoint;
    if (!bp) { showStatus('请先在画布上设置基点', 'err'); return; }
    APP.tool.previewObjs = []; APP.tool.phase = 0; vp.requestRedraw();
    try {
      if (mode === 'rotate') {
        const angleDeg = parseFloat(document.getElementById('cmd-angle')?.value) || 90;
        await invoke('rotate_objects', { rowIds, cx: bp.x, cy: bp.y, angleDeg });
      } else if (mode === 'scale') {
        const factor = parseFloat(document.getElementById('cmd-scale')?.value) || 2;
        await invoke('scale_objects', { rowIds, cx: bp.x, cy: bp.y, factor });
      }
      await loadObjects(); renderObjectList(); setActiveTool('select');
    } catch(err) { showStatus('操作失败: ' + err, 'err'); }
  },
};

// ── 工具函数 ─────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;');
}

// ── 项目 / 场景 UI ────────────────────────────────────────────────────────
async function loadProjects() {
  try {
    const summaries = await invoke('list_projects');
    const details = await Promise.all(
      summaries.map(s => invoke('get_project', { projectId: s.id }))
    );
    APP.projects = details.map(p => ({
      id: p.id,
      name: p.name,
      scenarios: [
        { id: p.base_scenario.id, name: p.base_scenario.name + ' (基准)' },
        ...(p.variants || []).map(v => ({ id: v.id, name: v.name })),
      ],
    }));
  } catch(err) {
    APP.projects = [];
    showStatus('加载项目失败: ' + err, 'err');
  }
  renderProjectTree();
}

function renderProjectTree() {
  const tree = document.getElementById('project-tree');
  if (!APP.projects.length) {
    tree.innerHTML = '<div class="empty-state">暂无项目<br>点击 + 新建</div>';
    return;
  }
  tree.innerHTML = APP.projects.map(proj => `
    <div class="proj-item">
      <div class="proj-name-row">
        <span class="proj-icon">📁</span>
        <span class="proj-name-text">${escHtml(proj.name)}</span>
        <button class="add-btn" data-proj-id="${proj.id}" title="新建场景">+</button>
      </div>
      ${(proj.scenarios || []).map(sc => `
        <div class="scenario-row${sc.id === APP.currentScenarioId ? ' active' : ''}"
             data-sid="${sc.id}" data-pid="${proj.id}">
          <span class="sc-icon">📋</span>
          <span class="sc-name">${escHtml(sc.name)}</span>
        </div>`).join('')}
    </div>`).join('');

  tree.querySelectorAll('.add-btn[data-proj-id]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      promptNewScenario(btn.dataset.projId);
    });
  });
  tree.querySelectorAll('.scenario-row').forEach(row => {
    row.addEventListener('click', () => selectScenario(row.dataset.pid, row.dataset.sid));
  });
}

async function promptNewProject() {
  const name = prompt('项目名称：');
  if (!name) return;
  try {
    await invoke('new_project', { name, crsEpsg: 4326 });
    await loadProjects();
  } catch(err) { showStatus('创建项目失败: ' + err, 'err'); }
}

async function promptNewScenario(projectId) {
  const name = prompt('场景名称：');
  if (!name) return;
  try {
    await invoke('add_scenario', { projectId, name });
    await loadProjects();
  } catch(err) { showStatus('创建场景失败: ' + err, 'err'); }
}

async function selectScenario(projectId, scenarioId) {
  APP.currentProjectId = projectId;
  APP.currentScenarioId = scenarioId;
  const sc = APP.projects.flatMap(p => p.scenarios || []).find(s => s.id === scenarioId);
  document.getElementById('status-scenario').textContent = sc?.name || scenarioId;
  document.getElementById('add-note').style.display = 'none';
  renderProjectTree();
  await loadObjects();
  renderObjectList();
}

function renderObjectList() {
  const list  = document.getElementById('object-list');
  const badge = document.getElementById('obj-count');
  badge.textContent = APP.objects.length;
  if (!APP.objects.length) {
    list.innerHTML = '<div class="empty-state">场景中暂无对象</div>';
    return;
  }
  const dotClass = { point_source:'dot-ps', road_source:'dot-road', barrier:'dot-bar' };
  list.innerHTML = APP.objects.map(obj => {
    const sel = APP.selectedIds.has(obj.row_id);
    return `<div class="obj-row${sel?' selected':''}" data-id="${obj.row_id}">
      <span class="dot ${dotClass[obj.object_type]||''}"></span>
      <span class="oname" title="${escHtml(obj.name)}">${escHtml(obj.name)}</span>
      <button class="odel" data-id="${obj.row_id}" title="删除">✕</button>
    </div>`;
  }).join('');

  list.querySelectorAll('.obj-row').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.classList.contains('odel')) return;
      const id = parseInt(row.dataset.id);
      if (!e.ctrlKey) APP.selectedIds = new Set();
      APP.selectedIds.has(id) ? APP.selectedIds.delete(id) : APP.selectedIds.add(id);
      renderObjectList();
      _updateSelectionCard();
      vp.requestRedraw();
    });
  });
  list.querySelectorAll('.odel').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      try {
        await invoke('delete_object', { scenarioId: APP.currentScenarioId, rowId: id });
        APP.selectedIds.delete(id);
        await loadObjects();
        renderObjectList();
      } catch(err) { showStatus('删除失败: ' + err, 'err'); }
    });
  });
}

// ── 数据加载 ─────────────────────────────────────────────────────────────
async function loadObjects() {
  if (!APP.currentScenarioId) {
    APP.objects = [];
    vp.requestRedraw();
    return;
  }
  try {
    APP.objects = await invoke('list_objects', { scenarioId: APP.currentScenarioId });
    APP.selectedIds = new Set();
    vp.fitToObjects(APP.objects, APP.calcResult);
    vp.requestRedraw();
    // Keep 3D scene in sync (only rebuild if 3D already initialized)
    if (R3D._initialized) R3D.sync();
  } catch(err) {
    showStatus('加载对象失败: ' + err, 'err');
  }
}
